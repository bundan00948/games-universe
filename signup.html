<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sign Up — Game Universe</title>
  <meta name="theme-color" content="#0c1814">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/auth-pages.css">
</head>
<body>
  <div class="auth-scene" aria-hidden="true"></div>
  <div class="auth-wrap">
    <main class="auth-card">
      <h1 class="auth-title">Sign Up</h1>
      <p class="auth-sub">Game Universe</p>
      <div id="msg" class="auth-msg" role="status"></div>
      <form id="form" autocomplete="on" novalidate>
        <label class="auth-label" for="username">Username</label>
        <input class="auth-input" type="text" id="username" name="username" autocomplete="nickname" required placeholder="Username">
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">
        <label class="auth-label" for="password">Password</label>
        <input class="auth-input" type="password" id="password" name="password" autocomplete="new-password" required placeholder="Choose a password">
        <button type="submit" class="auth-btn" id="submit">Create account</button>
      </form>
      <div class="auth-links">
        <a id="link-login" href="login.html">Already have an account? Log in</a>
        ·
        <a href="index.html">Home</a>
      </div>
    </main>
  </div>
  <script type="module">
    import { firebaseConfig } from "./assets/firebase-config.js";
    import { friendlyFirebaseMessage } from "./assets/firebase-errors.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import {
      initializeAuth,
      getAuth,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDocs,
      collection,
      query,
      where,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    let auth;
    try {
      auth = initializeAuth(app, { persistence: browserLocalPersistence });
    } catch (_) {
      auth = getAuth(app);
      setPersistence(auth, browserLocalPersistence).catch(() => {});
    }
    const db = getFirestore(app);
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const submit = document.getElementById("submit");

    const qs = new URLSearchParams(window.location.search);
    const nextRaw = qs.get("next");
    function safeNextUrl() {
      if (!nextRaw) return "/dashboard/";
      try {
        const d = decodeURIComponent(nextRaw);
        if (!d.startsWith("/") || d.startsWith("//")) return "/dashboard/";
        return d;
      } catch (_) {
        return "/dashboard/";
      }
    }
    const afterSignupUrl = safeNextUrl();
    const loginLink = document.getElementById("link-login");
    if (loginLink) {
      const q = nextRaw ? `?next=${encodeURIComponent(nextRaw)}` : "";
      loginLink.href = `login.html${q}`;
    }

    const defaultAvatar = "https://t3.ftcdn.net/jpg/00/64/67/80/360_F_64678017_zUpiZFjj04cnLri7oADnyMH0XBYyQghG.jpg";

    function setMsg(text, ok) {
      msg.textContent = text || "";
      msg.classList.toggle("ok", !!ok);
    }

    async function ensureUniqueDisplayId() {
      for (let attempt = 0; attempt < 80; attempt++) {
        const n = Math.floor(100000 + Math.random() * 900000);
        const idStr = String(n);
        const snap = await getDocs(query(collection(db, "users"), where("displayId", "==", idStr)));
        if (snap.empty) return idStr;
      }
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    async function saveUserProfile(uid, email, username) {
      const avatar = defaultAvatar;
      let coins = 0;
      let title = "User";
      const displayId = await ensureUniqueDisplayId();
      await setDoc(doc(db, "users", uid), {
        email,
        username: username || email.split("@")[0],
        avatar,
        coins,
        stars: 0,
        title,
        badges: [],
        displayId,
        ownedBannerIds: [],
        createdAt: serverTimestamp()
      }, { merge: true });
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace(afterSignupUrl);
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !email || !password) {
        setMsg("Fill in username, email, and password.");
        return;
      }
      submit.disabled = true;
      setMsg("Creating account…", true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await saveUserProfile(cred.user.uid, email, username);
        setMsg("Success — opening app…", true);
        window.location.replace(afterSignupUrl);
      } catch (err) {
        setMsg(friendlyFirebaseMessage(err));
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
