<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Login — Game Universe</title>
  <meta name="theme-color" content="#0c1814">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/auth-pages.css">
</head>
<body>
  <div class="auth-scene" aria-hidden="true"></div>
  <div class="auth-wrap">
    <main class="auth-card">
      <h1 class="auth-title">Login</h1>
      <p class="auth-sub">Game Universe</p>
      <div id="msg" class="auth-msg" role="status"></div>
      <form id="form" autocomplete="on" novalidate>
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" name="email" autocomplete="username" required placeholder="you@example.com">
        <label class="auth-label" for="password">Password</label>
        <input class="auth-input" type="password" id="password" name="password" autocomplete="current-password" required placeholder="Password">
        <button type="submit" class="auth-btn" id="submit">Log in</button>
      </form>
      <div class="auth-links">
        <a id="link-signup" href="signup.html">Need an account? Sign up</a>
        ·
        <a href="index.html">Home</a>
      </div>
    </main>
  </div>
  <script type="module">
    import { firebaseConfig } from "./assets/firebase-config.js";
    import { friendlyFirebaseMessage } from "./assets/firebase-errors.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import {
      initializeAuth,
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    (async function run() {
      const app = initializeApp(firebaseConfig);
      let auth;
      try {
        auth = initializeAuth(app, { persistence: browserLocalPersistence });
      } catch (_) {
        auth = getAuth(app);
        await setPersistence(auth, browserLocalPersistence).catch(() => {});
      }

      const qs = new URLSearchParams(window.location.search);
      const nextRaw = qs.get("next");
      function safeNextUrl() {
        if (!nextRaw) return "/dashboard/";
        try {
          const d = decodeURIComponent(nextRaw);
          if (!d.startsWith("/") || d.startsWith("//")) return "/dashboard/";
          return d;
        } catch (_) {
          return "/dashboard/";
        }
      }
      const afterLoginUrl = safeNextUrl();
      const signupLink = document.getElementById("link-signup");
      if (signupLink) {
        const q = nextRaw ? `?next=${encodeURIComponent(nextRaw)}` : "";
        signupLink.href = `signup.html${q}`;
      }

      const form = document.getElementById("form");
      const msg = document.getElementById("msg");
      const submit = document.getElementById("submit");

      function setMsg(text, ok) {
        msg.textContent = text || "";
        msg.classList.toggle("ok", !!ok);
      }

      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.replace(afterLoginUrl);
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) {
          setMsg("Enter email and password.");
          return;
        }
        submit.disabled = true;
        setMsg("Signing in…", true);
        try {
          await signInWithEmailAndPassword(auth, email, password);
          setMsg("Success — opening app…", true);
          window.location.replace(afterLoginUrl);
        } catch (err) {
          setMsg(friendlyFirebaseMessage(err));
          submit.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
