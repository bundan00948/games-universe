<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Login — Game Universe</title>
  <meta name="theme-color" content="#120818">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/auth-pages.css">
</head>
<body>
  <div class="auth-scene" aria-hidden="true"></div>
  <div class="auth-wrap">
    <div class="auth-top"></div>
    <main class="auth-card">
      <h1 class="auth-title">Login</h1>
      <p class="auth-sub">Game Universe</p>
      <div id="msg" class="auth-msg" role="status"></div>
      <form id="form" autocomplete="on" novalidate>
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" name="email" autocomplete="username" required placeholder="you@example.com">
        <label class="auth-label" for="password">Password</label>
        <input class="auth-input" type="password" id="password" name="password" autocomplete="current-password" required placeholder="Password">
        <button type="submit" class="auth-btn" id="submit">Log in</button>
      </form>
      <div class="auth-links">
        <a href="signup.html">Need an account? Sign up</a>
        ·
        <a href="index.html">Home</a>
      </div>
    </main>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC49VFcW1pjHq0sCkdcps_DwUAoo4z5oaw",
      authDomain: "blacket-65c5b.firebaseapp.com",
      databaseURL: "https://blacket-65c5b-default-rtdb.firebaseio.com",
      projectId: "blacket-65c5b",
      storageBucket: "blacket-65c5b.firebasestorage.app",
      messagingSenderId: "497023905730",
      appId: "1:497023905730:web:a59093052a3f93a476305b",
      measurementId: "G-XZZR5DH79B"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const submit = document.getElementById("submit");

    function setMsg(text, ok) {
      msg.textContent = text || "";
      msg.classList.toggle("ok", !!ok);
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace("/dashboard/");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        setMsg("Enter email and password.");
        return;
      }
      submit.disabled = true;
      setMsg("Signing in…", true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        setMsg("Success — opening dashboard…", true);
        window.location.replace("/dashboard/");
      } catch (err) {
        setMsg(err.message || "Login failed.");
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
