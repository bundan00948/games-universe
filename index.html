<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="First Unblooked Blooket Server — hundreds of free unblocked games, giveaways, and more on Game Universe.">
  <meta name="theme-color" content="#1a0c24">
  <title>Game Universe — First Unblooked Blooket Server</title>
  <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #120818;
      --bg-mid: #1e0f2a;
      --yellow: #ffffa0;
      --purple: #ee66ff;
      --text: #ffffff;
      --muted: #e8c8f8;
      --discord: #5865f2;
      --hero: url("https://i.postimg.cc/SK37fnxF/Screenshot-2026-04-11-at-18-25-43-removebg.png");
      --content-max: 1120px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      min-height: 100vh;
      overflow-x: clip;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse 80% 60% at 10% 20%, rgba(238, 102, 255, 0.18), transparent 55%),
        radial-gradient(ellipse 70% 50% at 90% 80%, rgba(255, 255, 160, 0.12), transparent 50%),
        linear-gradient(165deg, var(--bg) 0%, var(--bg-mid) 45%, #140a1c 100%);
    }
    .page-root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      max-width: var(--content-max);
      margin: 0 auto;
      width: 100%;
      padding: clamp(24px, 4vw, 40px) clamp(20px, 4vw, 40px) clamp(12px, 2vh, 20px);
    }
    .brand {
      font-family: 'Titan One', 'Nunito', sans-serif;
      font-weight: 400;
      font-size: clamp(1.35rem, 3vw, 1.85rem);
      letter-spacing: 0.02em;
      background: linear-gradient(105deg, #fff 0%, var(--yellow) 40%, var(--purple) 78%, #fde9ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    /* Full-bleed row: hero occupies entire right half of the viewport and is vertically centered */
    .split-bleed {
      flex: 1;
      display: flex;
      min-height: 0;
      width: 100vw;
      margin-left: calc(50% - 50vw);
    }
    .split-inner {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: center;
      gap: clamp(16px, 3vw, 40px);
      padding: 0 0 0 clamp(20px, 4vw, 40px);
      max-width: none;
    }
    @media (max-width: 900px) {
      .split-inner {
        grid-template-columns: 1fr;
        padding: 0 clamp(20px, 4vw, 40px);
        gap: 28px;
      }
      .visual { order: -1; min-height: 300px !important; width: 100% !important; margin-right: 0 !important; border-radius: 20px !important; }
    }
    .copy {
      max-width: 34rem;
      padding-right: clamp(8px, 2vw, 24px);
    }
    /* Only this line: Titan One, larger */
    .tagline {
      font-family: 'Titan One', 'Nunito', sans-serif;
      font-weight: 400;
      font-size: clamp(1.65rem, 4.2vw, 2.85rem);
      line-height: 1.2;
      color: var(--yellow);
      margin-bottom: 16px;
      text-shadow: 0 0 28px rgba(255, 255, 160, 0.3);
    }
    .lead {
      font-size: clamp(0.98rem, 1.85vw, 1.12rem);
      font-weight: 700;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #fffef0 0%, var(--yellow) 45%, #e6d020 100%);
      color: #0a0a0a;
      box-shadow: 0 8px 28px rgba(255, 255, 160, 0.35), 0 0 0 1px rgba(255, 255, 160, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 36px rgba(238, 102, 255, 0.25), 0 0 0 1px rgba(238, 102, 255, 0.35);
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(238, 102, 255, 0.45);
    }
    .btn-ghost:hover {
      background: rgba(238, 102, 255, 0.12);
      transform: translateY(-2px);
    }
    .btn-discord {
      background: var(--discord);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-discord:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(88, 101, 242, 0.45);
    }
    .visual {
      position: relative;
      height: min(78vh, 820px);
      width: calc(100% + max(0px, (100vw - var(--content-max)) / 2 + clamp(20px, 4vw, 40px)));
      margin-right: calc(50% - 50vw);
      justify-self: stretch;
      align-self: center;
      border-radius: 22px 0 0 22px;
      border: 1px solid rgba(255, 255, 160, 0.35);
      border-right: none;
      box-shadow:
        0 0 0 1px rgba(238, 102, 255, 0.2) inset,
        -8px 24px 60px rgba(0, 0, 0, 0.45),
        0 0 80px rgba(238, 102, 255, 0.12);
      background-color: rgba(30, 12, 42, 0.85);
      background-image: var(--hero);
      background-repeat: no-repeat;
      background-position: 92% center;
      background-size: 125% auto;
      overflow: hidden;
    }
    .visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, rgba(18, 8, 26, 0.82) 0%, rgba(18, 8, 26, 0.22) 48%, transparent 78%);
      pointer-events: none;
    }
    @media (max-width: 900px) {
      .visual {
        background-position: center center;
        background-size: 118% auto;
        border: 1px solid rgba(255, 255, 160, 0.35);
      }
      .visual::after {
        background: linear-gradient(180deg, rgba(18, 8, 26, 0.5) 0%, transparent 42%, rgba(18, 8, 26, 0.45) 100%);
      }
    }
    .foot-wrap {
      max-width: var(--content-max);
      margin: 0 auto;
      width: 100%;
      padding: 28px clamp(20px, 4vw, 40px) clamp(24px, 4vw, 40px);
    }
    footer.landing-foot {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.45);
    }
    footer.landing-foot a { color: var(--yellow); }
  </style>
</head>
<body>
  <div class="page-root">
    <div class="top-bar">
      <div class="brand" id="site-brand">GAME UNIVERSE</div>
    </div>
    <div class="split-bleed">
      <div class="split-inner">
        <div class="copy">
          <h2 class="tagline">First Unblooked Blooket Server</h2>
          <p class="lead">
            Hundreds of Free Unblocked Games, a high edge replicate, Giftcard and cash giveaways, fully written by Brendan.
          </p>
          <div class="actions">
            <a class="btn btn-primary" id="btn-login" href="login.html">Login</a>
            <a class="btn btn-ghost" id="btn-signup" href="signup.html">Sign Up</a>
            <a class="btn btn-discord" href="https://discord.gg/buf8sesyrB" target="_blank" rel="noopener noreferrer">Discord</a>
          </div>
        </div>
        <div class="visual" role="img" aria-label="Game icons hero art"></div>
      </div>
    </div>
    <div class="foot-wrap">
      <footer class="landing-foot">© Game Universe · <a href="https://gamesuniverse.org">gamesuniverse.org</a></footer>
    </div>
  </div>
</body>
</html>
