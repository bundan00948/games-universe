<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="First Game Platform — the first Blooket inspired public mobile gaming platform on Game Universe.">
  <meta name="theme-color" content="#0c1814">
  <title>Game Universe — First Game Platform</title>
  <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --left-bg: #0a1618;
      --right-bg: #120a1c;
      --yellow: #a8ff78;
      --purple: #78ffd6;
      --text: #e8fff4;
      --muted: #b8e8d8;
      /* Slight lean from plumb: seam matches between solid left and animated right (~2.7° at typical widths) */
      --split-skew: min(2.8vw, 40px);
      --blook-pattern: url("https://ac.blooket.com/@codeblooket/blooket-frontend-components/v0.2.45/assets/BlookCheckers-e975c505.png");
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      min-height: 100vh;
      overflow-x: clip;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--text);
      background: var(--right-bg);
    }
    .landing {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      background: var(--right-bg);
      overflow-x: clip;
    }
    .landing-left {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: clamp(20px, 4vw, 40px);
      min-height: 100vh;
      min-width: 0;
      background: var(--left-bg);
      /* Widen slightly so angled edge meets the right panel seam (no gap) */
      width: calc(100% + var(--split-skew));
      margin-right: calc(-1 * var(--split-skew));
      /* Near-vertical seam, tilted a little counterclockwise from plumb */
      clip-path: polygon(0 0, 100% 0, calc(100% - var(--split-skew)) 100%, 0 100%);
    }
    @media (max-width: 900px) {
      .landing {
        grid-template-columns: 1fr;
      }
      .landing-left {
        width: 100%;
        margin-right: 0;
        clip-path: none;
        background: var(--left-bg);
      }
      .landing-right {
        clip-path: none;
        min-height: min(52vh, 520px);
        order: -1;
      }
    }
    .brand-link {
      align-self: flex-start;
      font-family: 'Titan One', 'Nunito', sans-serif;
      font-weight: 400;
      font-size: clamp(1.2rem, 2.6vw, 1.65rem);
      letter-spacing: 0.02em;
      text-decoration: none;
      background: linear-gradient(105deg, #fff 0%, var(--yellow) 40%, var(--purple) 78%, #fde9ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: auto;
    }
    .brand-link:hover { filter: brightness(1.08); }
    .left-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(18px, 3vh, 28px);
      max-width: 28rem;
      padding-top: clamp(12px, 3vh, 32px);
      padding-bottom: clamp(24px, 5vh, 48px);
    }
    .hero-title {
      font-family: 'Titan One', 'Nunito', sans-serif;
      font-weight: 400;
      font-size: clamp(2.1rem, 5.5vw, 3.35rem);
      line-height: 1.08;
      color: var(--yellow);
      text-shadow: 0 0 24px rgba(168, 255, 120, 0.35);
    }
    .hero-title .line {
      display: block;
    }
    .lead {
      font-size: clamp(0.95rem, 1.75vw, 1.1rem);
      font-weight: 700;
      line-height: 1.6;
      color: var(--muted);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #fffef0 0%, var(--yellow) 45%, #e6d020 100%);
      color: #0a0a0a;
      box-shadow: 0 8px 28px rgba(255, 255, 160, 0.35), 0 0 0 1px rgba(255, 255, 160, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 36px rgba(238, 102, 255, 0.25), 0 0 0 1px rgba(238, 102, 255, 0.35);
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(238, 102, 255, 0.45);
    }
    .btn-ghost:hover {
      background: rgba(238, 102, 255, 0.12);
      transform: translateY(-2px);
    }
    .landing-right {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background: var(--right-bg);
      clip-path: polygon(var(--split-skew) 0, 100% 0, 100% 100%, 0 100%);
    }
    .landing-right::before {
      content: "";
      position: absolute;
      top: -14%;
      left: -14%;
      width: 128%;
      height: 128%;
      background-image: var(--blook-pattern);
      background-size: 460px 460px;
      background-repeat: repeat;
      opacity: 0.14;
      pointer-events: none;
      z-index: 0;
      transform-origin: 50% 42%;
      animation: landingPatternSwim 22s cubic-bezier(0.42, 0, 0.58, 1) infinite alternate;
    }
    @keyframes landingPatternSwim {
      0% {
        background-position: 0 0;
        transform: rotate(-2.4deg) scale(1.09);
      }
      100% {
        background-position: 230px -920px;
        transform: rotate(2.4deg) scale(1.12);
      }
    }
    .blook-stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 4vw, 40px);
    }
    .blook-stage img {
      max-width: 100%;
      max-height: min(78vh, 720px);
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.45));
    }
    .foot-wrap {
      grid-column: 1 / -1;
      padding: 20px clamp(20px, 4vw, 40px) clamp(24px, 4vw, 40px);
      background: rgba(7, 18, 16, 0.92);
      border-top: 1px solid rgba(255, 255, 160, 0.12);
    }
    footer.landing-foot {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
    }
    footer.landing-foot a { color: var(--yellow); }
    @media (prefers-reduced-motion: reduce) {
      .landing-right::before {
        animation: none !important;
        transform: rotate(-2.4deg) scale(1.09);
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <section class="landing-left" aria-label="Game Universe introduction">
      <a class="brand-link" href="https://gamesuniverse.org" target="_blank" rel="noopener noreferrer">Game Universe</a>
      <div class="left-body">
        <h1 class="hero-title">
          <span class="line">First</span>
          <span class="line">Game</span>
          <span class="line">Platform</span>
        </h1>
        <p class="lead">
          The first Blooket inspired public Mobile Gaming Platform, written entirely by Brendan
        </p>
        <div class="actions">
          <a class="btn btn-primary" id="btn-signup" href="signup.html">Sign Up</a>
          <a class="btn btn-ghost" id="btn-login" href="login.html">Login</a>
        </div>
      </div>
    </section>
    <section class="landing-right" aria-label="Blook artwork">
      <div class="blook-stage">
        <img src="https://i.postimg.cc/SK37fnxF/Screenshot-2026-04-11-at-18-25-43-removebg.png" alt="Blook character artwork" width="800" height="800" decoding="async" fetchpriority="high">
      </div>
    </section>
    <div class="foot-wrap">
      <footer class="landing-foot">© Game Universe · <a href="https://gamesuniverse.org">gamesuniverse.org</a></footer>
    </div>
  </div>
</body>
</html>
