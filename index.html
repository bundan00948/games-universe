<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="First Unblooked Blooket Server — hundreds of free unblocked games, giveaways, and more on Game Universe.">
  <meta name="theme-color" content="#1a0c24">
  <title>Game Universe — First Unblooked Blooket Server</title>
  <link rel="preload" href="assets/landing-hero.jpg" as="image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #120818;
      --bg-mid: #1e0f2a;
      --yellow: #ffffa0;
      --purple: #ee66ff;
      --text: #ffffff;
      --muted: #e8c8f8;
      --discord: #5865f2;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      min-height: 100vh;
      overflow-x: clip;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse 80% 60% at 10% 20%, rgba(238, 102, 255, 0.18), transparent 55%),
        radial-gradient(ellipse 70% 50% at 90% 80%, rgba(255, 255, 160, 0.12), transparent 50%),
        linear-gradient(165deg, var(--bg) 0%, var(--bg-mid) 45%, #140a1c 100%);
    }
    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 28px) clamp(28px, 5vw, 56px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .brand {
      font-family: 'Titan One', 'Nunito', sans-serif;
      font-weight: 400;
      font-size: clamp(1.35rem, 3vw, 1.85rem);
      letter-spacing: 0.02em;
      background: linear-gradient(105deg, #fff 0%, var(--yellow) 40%, var(--purple) 78%, #fde9ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: clamp(28px, 5vh, 48px);
      align-self: flex-start;
    }
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.12fr);
      gap: clamp(16px, 3vw, 40px);
      align-items: center;
      width: 100%;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; gap: 28px; }
      .hero-visual { order: -1; justify-content: center; min-height: auto; padding: 8px 0 0; }
      .hero-art {
        transform-origin: center center;
        max-height: min(52vh, 420px);
      }
    }
    .tagline {
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      font-weight: 900;
      color: var(--yellow);
      margin-bottom: 14px;
      line-height: 1.35;
      text-shadow: 0 0 24px rgba(255, 255, 160, 0.25);
    }
    .lead {
      font-size: clamp(0.98rem, 1.85vw, 1.12rem);
      line-height: 1.65;
      color: var(--muted);
      max-width: 36rem;
      margin-bottom: 28px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #fffef0 0%, var(--yellow) 45%, #e6d020 100%);
      color: #0a0a0a;
      box-shadow: 0 8px 28px rgba(255, 255, 160, 0.35), 0 0 0 1px rgba(255, 255, 160, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 36px rgba(238, 102, 255, 0.25), 0 0 0 1px rgba(238, 102, 255, 0.35);
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(238, 102, 255, 0.45);
    }
    .btn-ghost:hover {
      background: rgba(238, 102, 255, 0.12);
      transform: translateY(-2px);
    }
    .btn-discord {
      background: var(--discord);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-discord:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(88, 101, 242, 0.45);
    }
    /* Hero: no card frame — same-origin JPEG, scaled 50% larger from the right */
    .hero-visual {
      position: relative;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: min(72vh, 820px);
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: none;
      overflow: visible;
    }
    .hero-art {
      display: block;
      width: auto;
      height: auto;
      max-height: min(78vh, 880px);
      max-width: none;
      transform: scale(1.5);
      transform-origin: right center;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }
    .hero-visual::after {
      content: "";
      position: absolute;
      inset: -4% -8% -4% 28%;
      background: linear-gradient(100deg, rgba(18, 8, 26, 0.92) 0%, rgba(18, 8, 26, 0.25) 55%, transparent 100%);
      pointer-events: none;
    }
    @media (max-width: 900px) {
      .hero-visual::after {
        inset: 0;
        background: linear-gradient(180deg, rgba(18, 8, 26, 0.5) 0%, transparent 40%, rgba(18, 8, 26, 0.45) 100%);
      }
    }
    footer.landing-foot {
      margin-top: auto;
      padding-top: 32px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.45);
    }
    footer.landing-foot a { color: var(--yellow); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand" id="site-brand">GAME UNIVERSE</div>
    <div class="grid">
      <div class="copy">
        <h2 class="tagline">First Unblooked Blooket Server</h2>
        <p class="lead">
          Hundreds of Free Unblocked Games, a high edge replicate, Giftcard and cash giveaways, fully written by Brendan.
        </p>
        <div class="actions">
          <a class="btn btn-primary" id="btn-login" href="login.html">Login</a>
          <a class="btn btn-ghost" id="btn-signup" href="signup.html">Sign Up</a>
          <a class="btn btn-discord" href="https://discord.gg/buf8sesyrB" target="_blank" rel="noopener noreferrer">Discord</a>
        </div>
      </div>
      <div class="hero-visual" aria-hidden="true">
        <picture>
          <source srcset="assets/landing-hero.jpg" type="image/jpeg">
          <img
            class="hero-art"
            src="assets/landing-hero.jpg"
            width="1280"
            height="875"
            alt=""
            decoding="async"
            fetchpriority="high"
            onerror="this.onerror=null;this.src='assets/landing-hero.svg';this.classList.remove('hero-art');this.style.maxHeight='min(420px,55vh)';this.style.transform='none';"
          >
        </picture>
      </div>
    </div>
    <footer class="landing-foot">© Game Universe · <a href="https://gamesuniverse.org">gamesuniverse.org</a></footer>
  </div>
</body>
</html>
